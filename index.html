<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML = '<div style="color:red; background:black; padding:20px; font-family:monospace;"><h3>Global Error:</h3><pre>' + event.error?.stack + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="color:red; background:black; padding:20px; font-family:monospace;"><h3>Unhandled Promise Rejection:</h3><pre>' + event.reason?.stack + '</pre></div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
